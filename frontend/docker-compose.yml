version: '3.9'

services:
  # Frontend Service
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: banglafest_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-https://api.banglafest.co.uk}
    ports:
      - "localhost:${FRONTEND_PORT:-3001}:80"
    networks:
      - banglafest_frontend
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

networks:
  banglafest_frontend:
    driver: bridge
